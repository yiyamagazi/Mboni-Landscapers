<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>Mboni Landscapers</title>\n    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.1/aos.css'>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }\n        .gallery { display: flex; flex-wrap: wrap; }\n        .gallery-item { width: 30%; margin: 1%; position: relative; }\n        .item { width: 100%; }\n        @media (max-width: 768px) {\n            .gallery-item { width: 100%; }\n        }\n        .lead-form { display: flex; flex-direction: column; }\n        .lead-form input, .lead-form button { margin: 5px 0; }\n    </style>\n</head>\n<body data-aos='fade-up'>\n    <header>\n        <h1>Mboni Landscapers</h1>\n    </header>\n    <section>\n        <h2>Our Gallery</h2>\n        <div class='gallery' id='gallery'>\n            <div class='gallery-item'><img src='image1.jpg' class='item' alt='Landscape 1'></div>\n            <div class='gallery-item'><img src='image2.jpg' class='item' alt='Landscape 2'></div>\n            <div class='gallery-item'><img src='image3.jpg' class='item' alt='Landscape 3'></div>\n            <!-- Add more images as needed -->\n        </div>\n        <button onclick='filterGallery("all")'>All</button>\n        <button onclick='filterGallery("category1")'>Category 1</button>\n        <button onclick='filterGallery("category2")'>Category 2</button>\n    </section>\n    <section>\n        <h2>Worker Portal</h2>\n        <input type='password' id='pin' placeholder='Enter PIN'>\n        <button onclick='authenticate()'>Login</button>\n        <div id='worker-area' style='display:none;'>\n            <h3>Welcome Worker!</h3>\n            <p>You are now logged in.</p>\n        </div>\n    </section>\n    <section>\n        <h2>Lead Form</h2>\n        <form class='lead-form' id='leadForm' onsubmit='saveLead(event)'>\n            <input type='text' placeholder='Your Name' required>\n            <input type='email' placeholder='Your Email' required>\n            <button type='submit'>Submit</button>\n        </form>\n    </section>\n    <script src='https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.1/aos.js'></script>\n    <script>\n        AOS.init();\n        function filterGallery(category) {\n            const items = document.querySelectorAll('.gallery-item');\n            items.forEach(item => {\n                if (category === 'all' || item.classList.contains(category)) {\n                    item.style.display = 'block';\n                } else {\n                    item.style.display = 'none';\n                }\n            });\n        }\n        function authenticate() {\n            const pin = document.getElementById('pin').value;\n            if (pin === '1234') {\n                document.getElementById('worker-area').style.display = 'block';\n            } else {\n                alert('Incorrect PIN!');\n            }\n        }\n        function saveLead(event) {\n            event.preventDefault();\n            const formData = new FormData(event.target);\n            localStorage.setItem('lead', JSON.stringify(Object.fromEntries(formData)));\n            alert('Lead saved successfully!');\n        }\n    <\/script>\n</body>\n</html>
